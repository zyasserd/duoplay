title: Miguel Hache Intro
audio: https://upload.wikimedia.org/wikipedia/commons/e/e0/Miguel_Hache_-_voice.ogg

text: |
  [0.0]Hola,[0.25]soy Miguel Hernández,[1.19]
  [1.19]más conocido[1.93]como Miguel Hache.[2.76]
  [4.05]Me dedico a hacer fallas,[5.26]ilustración,[5.83]
  [5.83]murales,[6.35]títeres[6.88]y lo que surja[7.83]
  [8.26]Nací en Valencia[9.12]en 1984.[10.71]

translation: |
  Hi, I'm Miguel Hernández.
  Better known as Miguel Hache.
  I dedicate myself to making fallas and illustration.
  Murals, puppets, and whatever comes up.
  I was born in Valencia in 1984.

